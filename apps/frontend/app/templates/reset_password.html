{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="enterprise-card p-5">
            <h2 class="text-center mb-4">Reset Credentials</h2>
            <form method="POST">
                <div class="mb-4">
                    <label class="form-label fw-bold">Verified Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">New Security Key</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-enterprise w-100 py-2">Update Credentials</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
