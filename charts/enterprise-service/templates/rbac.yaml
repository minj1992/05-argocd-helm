{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "enterprise-service.serviceAccountName" . }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "enterprise-service.labels" . | nindent 4 }}
{{- end }}
{{- if .Values.rbac.enabled -}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "enterprise-service.fullname" . }}-cluster-reader
rules:
  {{- toYaml .Values.rbac.clusterRole.rules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "enterprise-service.fullname" . }}-cluster-reader-binding
subjects:
- kind: ServiceAccount
  name: {{ include "enterprise-service.serviceAccountName" . }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "enterprise-service.fullname" . }}-cluster-reader
  apiGroup: rbac.authorization.k8s.io
{{- end }}
