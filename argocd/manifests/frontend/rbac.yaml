apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-sa
  namespace: enterprise-lab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: frontend-cluster-reader
rules:
- apiGroups: [""]
  resources: ["pods", "nodes", "namespaces", "services"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: frontend-cluster-reader-binding
subjects:
- kind: ServiceAccount
  name: frontend-sa
  namespace: enterprise-lab
roleRef:
  kind: ClusterRole
  name: frontend-cluster-reader
  apiGroup: rbac.authorization.k8s.io
