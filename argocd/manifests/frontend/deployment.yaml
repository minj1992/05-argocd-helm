apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-service
  namespace: enterprise-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-service
  template:
    metadata:
      labels:
        app: frontend-service
    spec:
      containers:
      - name: frontend-service
        image: minjteck/frontend-service:v5
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: frontend-data
          mountPath: /data
        envFrom:
        - configMapRef:
            name: frontend-config
        - secretRef:
            name: frontend-secret
        - secretRef:
            name: mysql-secret
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
      volumes:
      - name: frontend-data
        persistentVolumeClaim:
          claimName: frontend-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service-svc
  namespace: enterprise-lab
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30005
  selector:
    app: frontend-service
