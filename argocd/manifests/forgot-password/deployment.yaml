apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgot-password-service
  namespace: enterprise-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgot-password-service
  template:
    metadata:
      labels:
        app: forgot-password-service
    spec:
      containers:
      - name: forgot-password-service
        image: minjteck/forgot-password-service:v3
        ports:
        - containerPort: 5000
        env:
        - name: MYSQL_HOST
          value: mysql-svc
        - name: MYSQL_DB
          value: enterprise_db
        - name: MYSQL_USER
          value: admin
        - name: MYSQL_PASSWORD
          value: password123
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
