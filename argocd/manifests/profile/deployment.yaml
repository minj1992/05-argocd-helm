apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile-service
  namespace: enterprise-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: profile-service
  template:
    metadata:
      labels:
        app: profile-service
    spec:
      containers:
      - name: profile-service
        image: minjteck/profile-service:v1
        ports:
        - containerPort: 5000
        env:
        - name: MYSQL_HOST
          value: mysql-svc
        - name: MYSQL_DB
          value: enterprise_db
        - name: MYSQL_USER
          value: admin
        - name: MYSQL_PASSWORD
          value: password123
        livenessProbe:
          httpGet:
            path: /profile/1
            port: 5000
          initialDelaySeconds: 30
