apiVersion: apps/v1
kind: Deployment
metadata:
  name: register-service
  namespace: enterprise-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: register-service
  template:
    metadata:
      labels:
        app: register-service
    spec:
      containers:
      - name: register-service
        image: minjteck/register-service:v4
        ports:
        - containerPort: 5000
        env:
        - name: MYSQL_HOST
          value: mysql-svc
        - name: MYSQL_DB
          value: enterprise_db
        - name: MYSQL_USER
          value: admin
        - name: MYSQL_PASSWORD
          value: password123
        - name: RABBITMQ_HOST
          value: rabbitmq-svc
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
