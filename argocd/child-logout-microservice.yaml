apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: logout-microservice
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/minj1992/05-argocd-helm.git
    targetRevision: master
    path: argocd/manifests/logout
  destination:
    server: https://kubernetes.default.svc
    namespace: enterprise-lab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
